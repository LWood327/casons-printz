<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cason's Printz — Anime-Inspired Custom Apparel</title>
  <meta name="description" content="Cason's Printz — clean, modern, anime-inspired custom apparel. Premade prints and fully custom designs." />

  <!-- Google Fonts (Space Grotesk for headings, Inter for body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ===================== HERO / HEADER ===================== -->
  <header id="top" class="hero">
    <nav class="nav">
      <a href="#top" class="brand">Cason's Printz</a>
      <ul class="nav-links">
        <li><a href="#premade">Premade</a></li>
        <li><a href="#custom">Custom</a></li>
        <li><a href="#footer">Contact</a></li>
      </ul>
    </nav>

    <div class="hero-content">
      <h1>Cason's Printz</h1>
      <p class="tagline">Anime-inspired custom apparel.</p>
      <!-- Stage 2 will flesh out hero copy, CTA buttons, and visuals -->
    </div>
  </header>

  <main>
    <!-- ===================== PREMADE ITEMS ===================== -->
    <section id="premade" class="section">
      <div class="container">
        <h2 class="section-title">Premade Items</h2>
        <!-- Product grid injected by js/main.js -->
        <div id="premade-grid" class="product-grid"></div>
      </div>
    </section>

    <!-- ===================== CUSTOM WORKS ===================== -->
    <section id="custom" class="section">
      <div class="container">
        <h2 class="section-title">Custom Works</h2>
        <!-- Product grid injected by js/main.js -->
        <div id="custom-grid" class="product-grid"></div>
      </div>
    </section>

    <!-- ===================== PRODUCT DETAIL VIEW ===================== -->
    <!-- Hash-router (#product/<id>) swaps this in over the page. Built in Stage 4. -->
    <section id="product-view" class="section" hidden>
      <div class="container" id="product-view-content"></div>
    </section>
  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer id="footer" class="footer">
    <div class="container">
      <p>&copy; <span id="year"></span> Cason's Printz</p>
      <!-- Social + contact placeholders built out in Stage 6 -->
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
